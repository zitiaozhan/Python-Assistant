<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#c4785a">
    <title>Personal Assistant · Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Tokens ─────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #f8f7f5;
    --bg-card: #ffffff;
    --bg-input: #f2f0ed;
    --border: #e0dbd3;
    --accent: #c4785a;
    --accent-soft: rgba(196,120,90,0.12);
    --text: #18181b;
    --text-sub: #6b6560;
    --text-muted: #9b9690;
    --success: #4da870;
    --success-soft: rgba(77,168,112,0.14);
    --danger: #c45a5a;
    --info: #5a7ec4;
    --radius: 20px;
    --radius-sm: 14px;
    --radius-xs: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
}

html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
}

/* ─── Layout ─────────────────────────────────────── */
.app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
}

/* ─── Header ─────────────────────────────────────── */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(12px + var(--safe-top)) 18px 12px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
}

.header-logo {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, #c4785a, #c97f64);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(196,120,90,0.3);
}

.header-logo svg { width: 18px; height: 18px; color: white; }

.header-title {
    min-width: 0;
}

.header-title h1 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.header-title p {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 1px;
}

.status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 0.76rem;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-sub);
    flex-shrink: 0;
    white-space: nowrap;
}

.status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 2px var(--success-soft);
    animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.8); }
}

/* ─── Messages ───────────────────────────────────── */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
}

.messages::-webkit-scrollbar { display: none; }

.msg {
    display: flex;
    gap: 8px;
    animation: msgIn 0.3s ease;
    max-width: 88%;
}

@keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.msg.user {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.msg.ai { align-self: flex-start; }

.avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: 2px;
}

.avatar.user-av {
    background: linear-gradient(135deg, var(--accent), #c97f64);
    color: white;
    box-shadow: 0 2px 8px rgba(196,120,90,0.3);
}

.avatar.ai-av {
    background: white;
    color: var(--accent);
    border: 1.5px solid var(--accent-soft);
}

.bubble {
    padding: 12px 15px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.72;
    word-break: break-word;
}

.user .bubble {
    background: linear-gradient(135deg, var(--accent), #c97f64);
    color: white;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 10px rgba(196,120,90,0.25);
}

.ai .bubble {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

/* ─── Markdown styles in AI bubble ──────────────── */
.ai .bubble p { margin-bottom: 8px; }
.ai .bubble p:last-child { margin-bottom: 0; }
.ai .bubble h1, .ai .bubble h2, .ai .bubble h3 {
    font-weight: 600; margin: 12px 0 6px; color: var(--text);
}
.ai .bubble h1 { font-size: 1.1rem; }
.ai .bubble h2 { font-size: 1rem; }
.ai .bubble h3 { font-size: 0.95rem; }
.ai .bubble ul, .ai .bubble ol { padding-left: 18px; margin: 6px 0; }
.ai .bubble li { margin-bottom: 3px; }
.ai .bubble code {
    font-family: 'JetBrains Mono', monospace;
    background: rgba(0,0,0,0.05);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.84em;
    color: var(--accent);
}
.ai .bubble pre {
    background: #1e1e2e;
    border-radius: 10px;
    padding: 12px 14px;
    margin: 8px 0;
    overflow-x: auto;
}
.ai .bubble pre code {
    color: #cdd6f4;
    background: none;
    padding: 0;
    font-size: 0.8rem;
    white-space: pre;
}
.ai .bubble a { color: var(--accent); text-decoration: underline; }
.ai .bubble strong { font-weight: 600; }
.ai .bubble em { font-style: italic; }
.ai .bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 10px;
    color: var(--text-sub);
    font-style: italic;
}
.ai .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

/* ─── Table styles ──────────────────────────────── */
.ai .bubble .table-wrapper {
    margin: 10px 0;
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
}
.ai .bubble table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    background: var(--bg-card);
}
.ai .bubble thead {
    background: rgba(196, 120, 90, 0.08);
}
.ai .bubble th {
    padding: 10px 12px;
    font-weight: 600;
    text-align: left;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    white-space: nowrap;
}
.ai .bubble td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
}
.ai .bubble tbody tr:hover {
    background: rgba(196, 120, 90, 0.04);
}
.ai .bubble tbody tr:last-child td {
    border-bottom: none;
}

/* Streaming cursor */
.streaming-cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    border-radius: 1px;
    animation: blink 1s step-end infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ─── Tool calls（折叠式，位于 AI 消息上方）─────── */
.msg-right {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 0;
    flex: 1;
    max-width: calc(88% - 38px);
}

.tool-calls-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msgIn 0.25s ease;
}

.tool-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    background: var(--bg-card);
    overflow: hidden;
    font-size: 0.78rem;
}

.tool-item.skill { border-left: 3px solid var(--info); }
.tool-item.bash  { border-left: 3px solid var(--accent); }

.tool-summary {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 11px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.tool-toggle {
    font-size: 0.6rem;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: transform 0.15s;
    width: 9px;
    text-align: center;
}

.tool-brief {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-sub);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.tool-detail {
    display: none;
    padding: 0 11px 9px;
}

.tool-detail pre {
    margin: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-sub);
    white-space: pre-wrap;
    word-break: break-all;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 9px;
    max-height: 160px;
    overflow-y: auto;
}

.tool-item.expanded .tool-detail { display: block; }
.tool-item.expanded .tool-toggle { transform: rotate(90deg); }

/* ─── Input Bar ──────────────────────────────────── */
.input-bar {
    padding: 10px 14px;
    padding-bottom: calc(10px + var(--safe-bottom));
    background: var(--bg-card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
}

.input-inner {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--bg-input);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.2s;
}

.input-inner:focus-within {
    border-color: var(--accent);
    background: white;
    box-shadow: 0 0 0 3px rgba(196,120,90,0.08);
}

.input-inner textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    resize: none;
    line-height: 1.5;
    max-height: 140px;
    min-height: 22px;
    overflow-y: auto;
}

.input-inner textarea::placeholder { color: var(--text-muted); }

.send-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), #c97f64);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(196,120,90,0.35);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.send-btn:active {
    transform: scale(0.94);
    box-shadow: 0 1px 4px rgba(196,120,90,0.3);
}

.send-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
}

/* ─── Toast ──────────────────────────────────────── */
.toast-wrap {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
}

.toast {
    background: rgba(24,24,27,0.88);
    color: white;
    font-size: 0.82rem;
    padding: 8px 16px;
    border-radius: 999px;
    backdrop-filter: blur(12px);
    animation: msgIn 0.25s ease;
    white-space: nowrap;
}

/* ─── Empty state ────────────────────────────────── */
.empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 32px;
    opacity: 0;
    animation: fadeIn 0.6s 0.2s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.empty-icon {
    width: 64px; height: 64px;
    border-radius: 20px;
    background: linear-gradient(135deg, #c4785a15, #c4785a25);
    display: flex;
    align-items: center;
    justify-content: center;
}

.empty-icon svg { width: 32px; height: 32px; color: var(--accent); opacity: 0.7; }

.empty-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
}

.empty-sub {
    font-size: 0.82rem;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
}
</style>
</head>
<body>
<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div class="header-title">
                <h1>Personal Assistant</h1>
                <p>远程控制模式</p>
            </div>
        </div>
        <div class="status-pill">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">连接中</span>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            </div>
            <div class="empty-title">开始对话</div>
            <div class="empty-sub">在下方输入消息，远程指挥电脑上的 AI 助手完成任务</div>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
        <div class="input-inner">
            <textarea id="chat-input" placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn" id="btn-send" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ─── Utilities ────────────────────────────────────
function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function showToast(msg) {
    const wrap = document.getElementById('toast-wrap');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

// ─── Simple Markdown renderer ──────────────────────
function renderMD(text) {
    if (!text) return '';
    const codeBlocks = [];
    const inlineCodes = [];

    text = text.replace(/```([\w]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        const i = codeBlocks.length;
        codeBlocks.push({ lang: lang.trim(), code: code.replace(/\n$/, '') });
        return `\x00CB${i}\x00`;
    });
    text = text.replace(/`([^`\n]+)`/g, (_, c) => {
        const i = inlineCodes.length;
        inlineCodes.push(c);
        return `\x00IC${i}\x00`;
    });

    text = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const lines = text.split('\n');
    const out = [];
    let inUl = false, inOl = false;

    const flush = () => {
        if (inUl) { out.push('</ul>'); inUl = false; }
        if (inOl) { out.push('</ol>'); inOl = false; }
    };

    for (const line of lines) {
        if (/^---+$/.test(line.trim())) { flush(); out.push('<hr>'); continue; }
        const hm = line.match(/^(#{1,6})\s+(.*)/);
        if (hm) { flush(); out.push(`<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`); continue; }
        const bq = line.match(/^&gt;\s?(.*)/);
        if (bq) { flush(); out.push(`<blockquote>${inl(bq[1])}</blockquote>`); continue; }
        const ul = line.match(/^\s*[-*+]\s+(.*)/);
        if (ul) { if (!inUl) { flush(); out.push('<ul>'); inUl = true; } out.push(`<li>${inl(ul[1])}</li>`); continue; }
        const ol = line.match(/^\s*\d+\.\s+(.*)/);
        if (ol) { if (!inOl) { flush(); out.push('<ol>'); inOl = true; } out.push(`<li>${inl(ol[1])}</li>`); continue; }
        flush();
        out.push(line.trim() === '' ? '<br>' : `<p>${inl(line)}</p>`);
    }
    flush();

    let html = out.join('\n');
    html = html.replace(/\x00IC(\d+)\x00/g, (_, i) => `<code>${escapeHtml(inlineCodes[+i])}</code>`);
    html = html.replace(/\x00CB(\d+)\x00/g, (_, i) => {
        const { lang, code } = codeBlocks[+i];
        return `<pre><code class="language-${escapeHtml(lang)}">${escapeHtml(code)}</code></pre>`;
    });
    return html;
}

function inl(t) {
    t = t.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
    t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\*(.*?)\*/g, '<em>$1</em>');
    t = t.replace(/~~(.*?)~~/g, '<del>$1</del>');
    t = t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" style="max-width:100%;border-radius:8px;">');
    t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    return t;
}

// ─── DOM helpers ──────────────────────────────────
const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('empty-state');
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('btn-send');

function hideEmpty() {
    if (emptyState && emptyState.parentNode) emptyState.remove();
}

function scrollBottom() {
    requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

function addUserMsg(text) {
    hideEmpty();
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
        <div class="avatar user-av">我</div>
        <div class="bubble">${escapeHtml(text)}</div>`;
    messagesEl.appendChild(div);
    scrollBottom();
}

// ─── Tool call helpers ────────────────────────────
function parseTC(data) {
    const name = data.name, args = data.arguments || {};
    if (name === 'use_skill') return { cls:'skill', icon:'⚡', brief:`使用技能: ${args.skill_name||'?'}`, detail:`技能名称: ${args.skill_name||'?'}` };
    if (name === 'bash')      return { cls:'bash',  icon:'⚙', brief:'使用工具: Bash', detail: args.command||'' };
    return { cls:'', icon:'🔧', brief:`工具调用: ${name}`, detail: JSON.stringify(args,null,2) };
}

function buildTCItem({ cls, icon, brief, detail }) {
    const item = document.createElement('div');
    item.className = `tool-item ${cls}`;
    const summary = document.createElement('div');
    summary.className = 'tool-summary';
    summary.innerHTML = `<span class="tool-toggle">▶</span><span>${icon}</span><span class="tool-brief">${escapeHtml(brief)}</span>`;
    summary.addEventListener('click', () => {
        item.classList.toggle('expanded');
        summary.querySelector('.tool-toggle').textContent = item.classList.contains('expanded') ? '▼' : '▶';
    });
    const detailEl = document.createElement('div');
    detailEl.className = 'tool-detail';
    detailEl.innerHTML = `<pre>${escapeHtml(detail)}</pre>`;
    item.appendChild(summary);
    item.appendChild(detailEl);
    return item;
}

function createAIBubble() {
    hideEmpty();
    const div = document.createElement('div');
    div.className = 'msg ai streaming';
    div.dataset.raw = '';
    div.innerHTML = `
        <div class="avatar ai-av">AI</div>
        <div class="msg-right">
            <div class="tool-calls-group" hidden></div>
            <div class="bubble"><span class="content"></span><span class="streaming-cursor"></span></div>
        </div>`;
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
}

function addTCToStreamingBubble(data) {
    const els = messagesEl.querySelectorAll('.msg.ai.streaming');
    if (!els.length) return;
    const group = els[els.length - 1].querySelector('.tool-calls-group');
    if (!group) return;
    group.hidden = false;
    group.appendChild(buildTCItem(parseTC(data)));
    scrollBottom();
}

function appendChunk(text) {
    const els = messagesEl.querySelectorAll('.msg.ai.streaming');
    if (!els.length) return;
    const last = els[els.length - 1];
    last.dataset.raw = (last.dataset.raw || '') + text;
    last.querySelector('.content').textContent = last.dataset.raw;
    scrollBottom();
}

function finalizeAI() {
    const els = messagesEl.querySelectorAll('.msg.ai.streaming');
    if (!els.length) return;
    const last = els[els.length - 1];
    last.classList.remove('streaming');
    const cur = last.querySelector('.streaming-cursor');
    if (cur) cur.remove();
    const content = last.querySelector('.content');
    const raw = last.dataset.raw || '';
    if (raw) content.innerHTML = renderMD(raw);
    scrollBottom();
}

function addCompletedAI(text, toolCalls = []) {
    hideEmpty();
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `
        <div class="avatar ai-av">AI</div>
        <div class="msg-right">
            ${toolCalls.length ? '<div class="tool-calls-group"></div>' : ''}
            <div class="bubble"><span class="content">${renderMD(text)}</span></div>
        </div>`;
    const group = div.querySelector('.tool-calls-group');
    if (group) toolCalls.forEach(tc => group.appendChild(buildTCItem(parseTC(tc))));
    messagesEl.appendChild(div);
    scrollBottom();
}

// ─── WebSocket ────────────────────────────────────
let ws = null;
let isStreaming = false;
let lastSent = null;
let pendingTC = [];  // 回放时缓存 tool_call

function setStatus(connected) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    if (dot) {
        dot.style.background = connected ? 'var(--success)' : 'var(--danger)';
        dot.style.boxShadow = connected ? '0 0 0 2px var(--success-soft)' : '0 0 0 2px rgba(196,90,90,0.15)';
    }
    if (txt) txt.textContent = connected ? '已连接' : '已断开';
    sendBtn.disabled = !connected;
}

function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws/chat`);

    ws.onopen = () => { setStatus(true); };
    ws.onclose = () => { setStatus(false); setTimeout(connect, 3000); };
    ws.onerror = () => setStatus(false);

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        switch (msg.type) {
            case 'user_message':
                if (lastSent === msg.content) { lastSent = null; break; }
                addUserMsg(msg.content);
                break;
            case 'start':
                isStreaming = true;
                createAIBubble();
                break;
            case 'chunk':
                appendChunk(msg.content);
                break;
            case 'tool_call':
                if (isStreaming) {
                    addTCToStreamingBubble(msg.data);
                } else {
                    pendingTC.push(msg.data);  // 回放时缓存
                }
                break;
            case 'done':
                isStreaming = false;
                finalizeAI();
                sendBtn.disabled = false;
                break;
            case 'error':
                isStreaming = false;
                showToast(msg.message || '出错了');
                sendBtn.disabled = false;
                messagesEl.querySelectorAll('.msg.ai.streaming').forEach(el => el.remove());
                break;
            case 'cleared':
                messagesEl.innerHTML = '';
                pendingTC = [];
                messagesEl.appendChild(Object.assign(document.createElement('div'), { className: 'empty-state', innerHTML: '<div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div class="empty-title">对话已清空</div>' }));
                break;
            case 'assistant_message':
                addCompletedAI(msg.content, pendingTC);
                pendingTC = [];
                break;
        }
    };
}

// ─── Send ─────────────────────────────────────────
function send() {
    const text = input.value.trim();
    if (!text || isStreaming || !ws || ws.readyState !== WebSocket.OPEN) return;
    lastSent = text;
    addUserMsg(text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    ws.send(JSON.stringify({ type: 'chat', content: text }));
}

sendBtn.addEventListener('click', send);

input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});

// ─── Init ─────────────────────────────────────────
connect();
</script>
